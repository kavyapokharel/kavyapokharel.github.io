<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Books</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:40px;
}

.year{
    font-size:28px;
    font-weight:bold;
    margin-top:40px;
    margin-bottom:20px;
}

.books{
    display:grid;
    grid-template-columns:repeat(3, 180px);
    gap:40px;
}

.books img {
  width: 180px;
  height: 260px;
  object-fit: cover;
  border-radius: 6px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

.books img:hover{
    transform:scale(1.05);
}
</style>
</head>

<body>


<div class="year">2021</div>
<div class="books">
    <img src="zerotoone.jpg">
    <img src="thinkandgrowrich.png">
    <img src="1984.jpg">
    <img src="Animal Farm.jpg">
</div>



</body>
</html>
