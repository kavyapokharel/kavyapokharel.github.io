<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Books</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:40px;
}

.year{
    font-size:28px;
    font-weight:bold;
    margin-top:40px;
    margin-bottom:20px;
}

.books{
    display:grid;
    grid-template-columns:repeat(3, 180px);
    gap:40px;
}

.books img{
    width:180px;
    height:auto;
    border-radius:6px;
    box-shadow:0 4px 10px rgba(0,0,0,0.15);
    transition:transform 0.2s;
}

.books img:hover{
    transform:scale(1.05);
}
</style>
</head>

<body>

<div class="year">2026</div>
<div class="books">
    <img src="books/fiction_to_million.png">
    <img src="books/letters_to_a_young_poet.png">
</div>

<div class="year">2021</div>
<div class="books">
    <img src="books/zerotoone.jpg">
    <img src="books/thinkandgrowrich.png">
</div>

<div class="year">2020</div>
<div class="books">
    <img src="books/flow.jpg">
    <img src="books/thinking_fast_and_slow.jpg">
    <img src="books/siddhartha.jpg">
</div>

</body>
</html>
